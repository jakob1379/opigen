name: Release container

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: release-container
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: Run flake checks
        run: nix flake check --print-build-logs

      - name: Build check derivations
        shell: bash
        run: |
          set -euo pipefail
          system="$(nix eval --raw --impure --expr builtins.currentSystem)"
          nix build ".#checks.$system.opigen-backup" ".#checks.$system.ruff" --print-build-logs

  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      # Required to push release images to GitHub Container Registry.
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: Validate release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          semver='^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'
          if [[ ! "$tag_name" =~ $semver ]]; then
            echo "::error::Expected a semver tag like v1.2.3 or 1.2.3, got: $tag_name"
            exit 1
          fi

          version="${tag_name#v}"
          docker_version="${version//+/_}"
          docker_source_tag="${tag_name//+/_}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          {
            echo "image=$image"
            echo "source_tag=$docker_source_tag"
            echo "version_tag=$docker_version"
            if [[ "$version" == *-* ]]; then
              echo "stable=false"
            else
              echo "stable=true"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Build image with Nix
        run: nix build .#dockerImage --out-link image.tar.gz --print-build-logs

      - name: Load image
        id: loaded_image
        shell: bash
        run: |
          set -euo pipefail

          load_output="$(docker load --input image.tar.gz)"
          printf '%s\n' "$load_output"

          source_image="$(printf '%s\n' "$load_output" | sed -n 's/^Loaded image: //p' | tail -n 1)"
          if [[ -z "$source_image" ]]; then
            echo "::error::Could not determine loaded image tag"
            exit 1
          fi

          echo "source_image=$source_image" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        env:
          ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

      - name: Tag and push image
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SOURCE_IMAGE: ${{ steps.loaded_image.outputs.source_image }}
          SOURCE_TAG: ${{ steps.meta.outputs.source_tag }}
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
          STABLE: ${{ steps.meta.outputs.stable }}
        run: |
          set -euo pipefail

          tags=("$IMAGE:$VERSION_TAG")
          if [[ "$SOURCE_TAG" != "$VERSION_TAG" ]]; then
            tags+=("$IMAGE:$SOURCE_TAG")
          fi
          if [[ "$STABLE" == "true" ]]; then
            tags+=("$IMAGE:latest")
          fi

          for tag in "${tags[@]}"; do
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done
